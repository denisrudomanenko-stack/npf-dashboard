version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3100:80"
    depends_on:
      - backend
    networks:
      - npf-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8100:8000"
    volumes:
      - ./data:/app/data
      - ./db:/app/db              # БД на диске хоста
      - ./chroma_db:/app/chroma_db # ChromaDB на диске хоста
      - npf_uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./db/npf.db
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - OLLAMA_BASE_URL=http://ollama:11434
    env_file:
      - .env
    depends_on:
      - ollama
    networks:
      - npf-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - npf_ollama:/root/.ollama
    networks:
      - npf-network
    # For NVIDIA GPU support on Linux, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  npf-network:
    driver: bridge

volumes:
  npf_uploads:
  npf_ollama:
