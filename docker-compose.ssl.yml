# SSL configuration for 24pensi.ru
# Usage: docker compose -f docker-compose.ssl.yml --env-file .env.server up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - npf-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - npf_uploads:/app/uploads
      - npf_chroma:/app/chroma_db
      - npf_documents:/app/data/documents
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-npf}:${POSTGRES_PASSWORD:-npf_secure_password}@postgres:5432/${POSTGRES_DB:-npf_db}
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - OLLAMA_BASE_URL=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TIMEWEB_AI_TOKEN=${TIMEWEB_AI_TOKEN:-}
      - TIMEWEB_AGENT_ID=${TIMEWEB_AGENT_ID:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - CHAT_PROVIDER=${CHAT_PROVIDER:-timeweb}
      - SECRET_KEY=${SECRET_KEY:-production-secret-key}
      - APP_ENV=production
      - DEBUG=false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - npf-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-npf}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-npf_secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-npf_db}
    volumes:
      - npf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npf} -d ${POSTGRES_DB:-npf_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - npf-network
    restart: unless-stopped

networks:
  npf-network:
    driver: bridge

volumes:
  npf_postgres_data:
  npf_uploads:
  npf_chroma:
  npf_documents:
