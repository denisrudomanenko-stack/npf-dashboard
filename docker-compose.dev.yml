version: '3.8'

# Development configuration with hot reload
# Uses host's Ollama instead of containerized version

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3100:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_API_URL=http://localhost:8100
    depends_on:
      - backend
    networks:
      - npf-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8100:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./db:/app/db
      - npf_uploads_dev:/app/uploads
      - npf_chroma_dev:/app/chroma_db
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./db/npf.db
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - INIT_ADMIN_USERNAME=${INIT_ADMIN_USERNAME:-}
      - INIT_ADMIN_EMAIL=${INIT_ADMIN_EMAIL:-}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-}
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - npf-network

networks:
  npf-network:
    driver: bridge

volumes:
  npf_uploads_dev:
  npf_chroma_dev:
