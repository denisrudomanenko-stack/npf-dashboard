# Server configuration (Timeweb AI for RAG)
# PostgreSQL + Backend + Frontend
#
# Usage: docker compose -f docker-compose.simple.yml --env-file .env.server up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - npf-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - npf_uploads:/app/uploads
      - npf_documents:/app/data/documents
      - npf_chroma:/app/data/chromadb
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-npf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-npf_db}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      - APP_ENV=production
      - DEBUG=false
      # Initial admin (created on first start)
      - INIT_ADMIN_USERNAME=${INIT_ADMIN_USERNAME:-}
      - INIT_ADMIN_EMAIL=${INIT_ADMIN_EMAIL:-}
      - INIT_ADMIN_PASSWORD=${INIT_ADMIN_PASSWORD:-}
      # AI Providers
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TIMEWEB_AI_TOKEN=${TIMEWEB_AI_TOKEN:-}
      - TIMEWEB_AGENT_ID=${TIMEWEB_AGENT_ID:-}
      - TIMEWEB_AGENT_ID_NO_RAG=${TIMEWEB_AGENT_ID_NO_RAG:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - CHAT_PROVIDER=${CHAT_PROVIDER:-timeweb}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - npf-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-npf}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-npf_db}
    volumes:
      - npf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npf} -d ${POSTGRES_DB:-npf_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - npf-network
    restart: unless-stopped

networks:
  npf-network:
    driver: bridge

volumes:
  npf_postgres_data:
  npf_uploads:
  npf_documents:
  npf_chroma:
