# Server/Production configuration
# - PostgreSQL for data
# - Ollama ONLY for embeddings (nomic-embed-text, ~275MB)
# - Claude API for LLM responses
#
# Usage: docker compose -f docker-compose.server.yml up -d

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - npf-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - npf_uploads:/app/uploads
      - npf_chroma:/app/chroma_db
      - npf_documents:/app/data/documents
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-npf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-npf_db}
      - CHROMA_PERSIST_DIRECTORY=/app/chroma_db
      - OLLAMA_BASE_URL=http://ollama:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - APP_ENV=production
      - DEBUG=false
      # Force Claude API for chat (Ollama only for embeddings)
      - CHAT_PROVIDER=anthropic
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - npf-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-npf}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-npf_db}
    volumes:
      - npf_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npf} -d ${POSTGRES_DB:-npf_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - npf-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - npf_ollama_embed:/root/.ollama
    # No external port - only internal access for embeddings
    networks:
      - npf-network
    restart: unless-stopped
    # Auto-pull embedding model on startup
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"]

networks:
  npf-network:
    driver: bridge

volumes:
  npf_postgres_data:
  npf_uploads:
  npf_chroma:
  npf_documents:
  npf_ollama_embed:
